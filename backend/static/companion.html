<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zitex Companion - مساعدك الذكي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 1000px;
            width: 100%;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .chat-header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9fafb;
        }
        
        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }
        
        .message.user .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .message.assistant .message-content {
            background: white;
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .message-image {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
            cursor: pointer;
        }
        
        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e5e7eb;
        }
        
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        
        .textarea-wrapper {
            flex: 1;
            position: relative;
        }
        
        textarea {
            width: 100%;
            padding: 12px 50px 12px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            min-height: 50px;
            max-height: 150px;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .attach-button {
            position: absolute;
            left: 10px;
            bottom: 10px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        
        .attach-button:hover {
            background: #f3f4f6;
        }
        
        .attach-button svg {
            width: 24px;
            height: 24px;
            fill: #667eea;
        }
        
        .send-button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .send-button:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        
        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .image-preview-container {
            display: none;
            padding: 10px;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .image-preview {
            position: relative;
            display: inline-block;
        }
        
        .image-preview img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 8px;
            border: 2px solid #e5e7eb;
        }
        
        .remove-image {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
        }
        
        .remove-image:hover {
            background: #dc2626;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #666;
            padding: 10px;
        }
        
        .loading.active {
            display: block;
        }
        
        input[type="file"] {
            display: none;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 Zitex Companion</h1>
            <p>مساعدك الذكي لبناء المواقع والتطبيقات</p>
        </div>
        
        <div class="messages-container" id="messagesContainer">
            <div class="message assistant">
                <div class="message-avatar">Z</div>
                <div class="message-content">
                    مرحباً! أنا Zitex Companion 👋<br>
                    أستطيع مساعدتك في:<br>
                    • تصميم وبناء مواقع ويب<br>
                    • كتابة الأكواد البرمجية<br>
                    • تحليل الصور والتصاميم<br>
                    • الإجابة على أسئلتك التقنية<br><br>
                    يمكنك أيضاً إرفاق صور (تصاميم، screenshots، إلخ) وسأحللها لك! 📸
                </div>
            </div>
        </div>
        
        <div class="input-container">
            <div class="image-preview-container" id="imagePreviewContainer"></div>
            <div class="loading" id="loadingIndicator">
                <span class="spinner"></span>
                <span>جاري الإرسال...</span>
            </div>
            <div class="input-wrapper">
                <div class="textarea-wrapper">
                    <textarea 
                        id="messageInput" 
                        placeholder="اكتب رسالتك هنا... أو ارفق صورة 📎"
                        rows="1"
                    ></textarea>
                    <button class="attach-button" id="attachButton" title="رفع صورة">
                        <svg viewBox="0 0 24 24">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                        </svg>
                    </button>
                    <input type="file" id="fileInput" accept="image/*" />
                </div>
                <button class="send-button" id="sendButton">إرسال</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE = window.location.origin;
        let sessionId = localStorage.getItem('zitex_session_id');
        let currentImage = null;
        
        // Elements
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const attachButton = document.getElementById('attachButton');
        const fileInput = document.getElementById('fileInput');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const loadingIndicator = document.getElementById('loadingIndicator');
        
        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
        
        // Attach button
        attachButton.addEventListener('click', () => {
            fileInput.click();
        });
        
        // File selection
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (!file.type.startsWith('image/')) {
                    alert('يرجى اختيار ملف صورة فقط');
                    return;
                }
                
                currentImage = file;
                showImagePreview(file);
            }
        });
        
        // Show image preview
        function showImagePreview(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreviewContainer.innerHTML = `
                    <div class="image-preview">
                        <img src="${e.target.result}" alt="معاينة">
                        <button class="remove-image" onclick="removeImage()">✕</button>
                    </div>
                `;
                imagePreviewContainer.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
        
        // Remove image
        window.removeImage = function() {
            currentImage = null;
            imagePreviewContainer.style.display = 'none';
            imagePreviewContainer.innerHTML = '';
            fileInput.value = '';
        };
        
        // Send message
        async function sendMessage() {
            const message = messageInput.value.trim();
            
            if (!message && !currentImage) {
                return;
            }
            
            // Create or get session
            if (!sessionId) {
                await createSession();
            }
            
            // Add user message to UI
            addMessage('user', message, currentImage ? URL.createObjectURL(currentImage) : null);
            
            // Clear input
            const imageToSend = currentImage;
            messageInput.value = '';
            messageInput.style.height = 'auto';
            removeImage();
            
            // Show loading
            loadingIndicator.classList.add('active');
            sendButton.disabled = true;
            
            // Send to API
            try {
                const formData = new FormData();
                formData.append('message', message || 'صورة مرفقة');
                formData.append('settings', JSON.stringify({}));
                
                if (imageToSend) {
                    formData.append('attachments', imageToSend);
                }
                
                const token = localStorage.getItem('zitex_token') || 'demo_token';
                
                const response = await fetch(`${API_BASE}/api/sessions/${sessionId}/messages`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                // Add AI response
                const aiMessage = data.ai_response || data.response || 'حدث خطأ';
                const aiAttachments = data.attachments || [];
                
                // Extract images from attachments
                const imageUrl = aiAttachments.find(a => a.type === 'image')?.url;
                
                addMessage('assistant', aiMessage, imageUrl);
                
            } catch (error) {
                console.error('Error:', error);
                addMessage('assistant', '⚠️ عذراً، حدث خطأ في الإرسال. يرجى المحاولة مرة أخرى.');
            } finally {
                loadingIndicator.classList.remove('active');
                sendButton.disabled = false;
            }
        }
        
        // Create session
        async function createSession() {
            try {
                const token = localStorage.getItem('zitex_token') || 'demo_token';
                
                const response = await fetch(`${API_BASE}/api/sessions`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        session_type: 'companion',
                        title: 'Companion Chat'
                    })
                });
                
                if (!response.ok) {
                    throw new Error('Failed to create session');
                }
                
                const data = await response.json();
                sessionId = data.session_id;
                localStorage.setItem('zitex_session_id', sessionId);
                
            } catch (error) {
                console.error('Failed to create session:', error);
                // Use demo session
                sessionId = 'demo_' + Date.now();
                localStorage.setItem('zitex_session_id', sessionId);
            }
        }
        
        // Add message to UI
        function addMessage(role, content, imageUrl = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = role === 'user' ? '👤' : 'Z';
            
            let imageHtml = '';
            if (imageUrl) {
                imageHtml = `<img src="${imageUrl}" class="message-image" onclick="window.open('${imageUrl}', '_blank')" />`;
            }
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    ${content.replace(/\n/g, '<br>')}
                    ${imageHtml}
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // Initialize - Try to get or create a demo user
        async function initializeAuth() {
            let token = localStorage.getItem('zitex_token');
            
            if (!token) {
                // Create demo user for testing
                try {
                    const demoEmail = `demo_${Date.now()}@zitex.test`;
                    const demoPassword = 'demo123';
                    
                    // Register
                    const registerResponse = await fetch(`${API_BASE}/api/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: demoEmail,
                            password: demoPassword,
                            full_name: 'Demo User'
                        })
                    });
                    
                    if (registerResponse.ok) {
                        const registerData = await registerResponse.json();
                        token = registerData.token;
                        localStorage.setItem('zitex_token', token);
                        console.log('Demo user created');
                    }
                } catch (error) {
                    console.error('Auth error:', error);
                    // Fallback to mock token
                    token = 'demo_fallback_' + Date.now();
                    localStorage.setItem('zitex_token', token);
                }
            }
        }
        
        initializeAuth();
    </script>
</body>
</html>
