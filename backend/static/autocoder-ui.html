<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 AutoCoder Chat | Zitex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f7f7f7;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }
        .message.user {
            flex-direction: row-reverse;
        }
        .message .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .message.user .avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-left: 10px;
        }
        .message.assistant .avatar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin-right: 10px;
        }
        .message .bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        .message.user .bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .message.assistant .bubble {
            background: white;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .message .bubble img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }
        .input-area {
            background: white;
            padding: 20px;
            border-top: 1px solid #e0e0e0;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-wrapper textarea {
            flex: 1;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            padding: 12px 20px;
            font-size: 15px;
            resize: none;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-wrapper textarea:focus {
            border-color: #667eea;
        }
        .input-wrapper button {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .input-wrapper button:hover {
            transform: scale(1.1);
        }
        .input-wrapper button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .file-upload {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .file-upload input[type="file"] {
            display: none;
        }
        .file-upload label {
            padding: 8px 16px;
            background: #f0f0f0;
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
        }
        .file-upload label:hover {
            background: #e0e0e0;
        }
        .file-preview {
            margin-top: 10px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 10px;
            font-size: 13px;
            color: #666;
        }
        .typing-indicator {
            display: none;
            padding: 10px 20px;
            background: white;
            border-radius: 18px;
            width: fit-content;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .typing-indicator.active {
            display: block;
        }
        .typing-indicator span {
            height: 10px;
            width: 10px;
            background: #667eea;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .error {
            background: #ff4444;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💬 AutoCoder Chat</h1>
            <p>دردش مع AI، أرسل صور، سجّل صوت</p>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="avatar">🤖</div>
                <div class="bubble">مرحباً! أنا AutoCoder، مساعدك الذكي. كيف أقدر أساعدك اليوم؟</div>
            </div>
        </div>
        
        <div class="input-area">
            <div class="file-preview" id="filePreview" style="display:none;"></div>
            
            <div class="input-wrapper">
                <textarea 
                    id="messageInput" 
                    placeholder="اكتب رسالتك هنا..."
                    rows="1"
                ></textarea>
                <button id="sendBtn" onclick="sendMessage()">📤</button>
            </div>
            
            <div class="file-upload">
                <label for="imageUpload">📷 صورة</label>
                <input type="file" id="imageUpload" accept="image/*" onchange="handleImageUpload(event)">
                
                <label for="audioUpload">🎤 صوت</label>
                <input type="file" id="audioUpload" accept="audio/*" onchange="handleAudioUpload(event)">
            </div>
        </div>
    </div>

    <script>
        let uploadedImage = null;
        let conversationHistory = [];

        // Auto-resize textarea
        const messageInput = document.getElementById('messageInput');
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        // Send on Enter (Shift+Enter for new line)
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function addMessage(role, content, imageUrl = null) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;
            
            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                bubble.appendChild(img);
            }
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            chatMessages.appendChild(messageDiv);
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping() {
            const chatMessages = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="typing-indicator active">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTyping() {
            const typingDiv = document.getElementById('typingIndicator');
            if (typingDiv) typingDiv.remove();
        }

        function showError(message) {
            const chatMessages = document.getElementById('chatMessages');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = '❌ ' + message;
            chatMessages.appendChild(errorDiv);
            setTimeout(() => errorDiv.remove(), 5000);
        }

        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();
            
            if (!message && !uploadedImage) return;
            
            // Add user message
            addMessage('user', message || '(صورة)', uploadedImage);
            
            // Build request
            const payload = {
                message: message,
                image_url: uploadedImage,
                conversation_history: conversationHistory
            };
            
            // Clear input
            messageInput.value = '';
            messageInput.style.height = 'auto';
            uploadedImage = null;
            document.getElementById('filePreview').style.display = 'none';
            
            // Show typing
            showTyping();
            
            try {
                const response = await fetch('/api/autocoder/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                hideTyping();
                
                if (!response.ok) {
                    const error = await response.json();
                    showError(error.detail || 'حدث خطأ في الإرسال');
                    return;
                }
                
                const data = await response.json();
                addMessage('assistant', data.response);
                
                // Update history
                conversationHistory = data.conversation_history || [];
                
            } catch (error) {
                hideTyping();
                showError('فشل الاتصال بالخادم');
                console.error(error);
            }
        }

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch('/api/autocoder/upload', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    showError('فشل رفع الصورة');
                    return;
                }
                
                const data = await response.json();
                uploadedImage = data.url;
                
                const preview = document.getElementById('filePreview');
                preview.innerHTML = `📷 تم رفع: ${file.name}`;
                preview.style.display = 'block';
                
            } catch (error) {
                showError('خطأ في رفع الصورة');
                console.error(error);
            }
        }

        async function handleAudioUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            const preview = document.getElementById('filePreview');
            preview.innerHTML = '🎤 جاري تحويل الصوت...';
            preview.style.display = 'block';
            
            try {
                const response = await fetch('/api/autocoder/transcribe', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    showError('فشل تحويل الصوت');
                    preview.style.display = 'none';
                    return;
                }
                
                const data = await response.json();
                document.getElementById('messageInput').value = data.text;
                preview.style.display = 'none';
                
            } catch (error) {
                showError('خطأ في تحويل الصوت');
                preview.style.display = 'none';
                console.error(error);
            }
        }
    </script>
</body>
</html>
