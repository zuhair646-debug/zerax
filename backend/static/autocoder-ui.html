<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 AutoCoder | Zitex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #6D28D9 0%, #8B5CF6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* Login Screen */
        #loginScreen {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        #loginScreen h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #6D28D9 0%, #8B5CF6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #loginScreen p {
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #8B5CF6;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6D28D9 0%, #8B5CF6 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
        }
        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Chat Screen */
        #chatScreen {
            display: none;
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            height: 90vh;
            flex-direction: column;
        }
        .chat-header {
            background: linear-gradient(135deg, #6D28D9 0%, #8B5CF6 100%);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-radius: 20px 20px 0 0;
        }
        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            color: #6D28D9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }
        .user-info h2 {
            font-size: 20px;
            margin-bottom: 5px;
        }
        .user-info p {
            font-size: 13px;
            opacity: 0.9;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f7f7f7;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .message.user {
            flex-direction: row-reverse;
        }
        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .message.user .message-avatar {
            background: linear-gradient(135deg, #6D28D9 0%, #8B5CF6 100%);
            color: white;
        }
        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .message-bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.5;
        }
        .message.user .message-bubble {
            background: linear-gradient(135deg, #6D28D9 0%, #8B5CF6 100%);
            color: white;
        }
        .message.assistant .message-bubble {
            background: white;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .input-area {
            background: white;
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            border-radius: 0 0 20px 20px;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .input-wrapper textarea {
            flex: 1;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 12px 16px;
            font-size: 15px;
            resize: none;
            font-family: inherit;
            max-height: 120px;
        }
        .input-wrapper textarea:focus {
            outline: none;
            border-color: #8B5CF6;
        }
        .btn-send {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #6D28D9 0%, #8B5CF6 100%);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .btn-send:hover {
            transform: scale(1.1);
        }
        .typing {
            display: none;
            padding: 10px 15px;
            background: white;
            border-radius: 18px;
            width: fit-content;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .typing.active {
            display: block;
        }
        .typing span {
            height: 8px;
            width: 8px;
            background: #8B5CF6;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        @media (max-width: 768px) {
            #chatScreen { height: 100vh; border-radius: 0; }
            .chat-header { border-radius: 0; }
            .input-area { border-radius: 0; }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen">
        <h1>💬 AutoCoder</h1>
        <p>مساعدك الذكي في البرمجة</p>
        <form id="loginForm">
            <div class="form-group">
                <label>الاسم *</label>
                <input type="text" id="userName" required placeholder="أدخل اسمك">
            </div>
            <div class="form-group">
                <label>الدور</label>
                <input type="text" id="userRole" placeholder="مطور، مدير، مصمم، إلخ">
            </div>
            <div class="form-group">
                <label>نبذة تعريفية</label>
                <textarea id="userBio" placeholder="أخبرنا عن نفسك (اختياري)"></textarea>
            </div>
            <button type="submit" class="btn-login">دخول 🚀</button>
        </form>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen">
        <div class="chat-header">
            <div class="user-avatar" id="headerAvatar"></div>
            <div class="user-info">
                <h2 id="headerName"></h2>
                <p id="headerRole"></p>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="message-avatar">🤖</div>
                <div class="message-bubble">
                    مرحباً! أنا AutoCoder، مساعدك الذكي في البرمجة. كيف يمكنني مساعدتك اليوم؟
                </div>
            </div>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="messageInput" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>
                <button class="btn-send" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        let userData = null;
        let conversationHistory = [];

        // Login Handler
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('userName').value.trim();
            const role = document.getElementById('userRole').value.trim();
            const bio = document.getElementById('userBio').value.trim();
            
            if (!name) return;
            
            userData = { name, role, bio };
            
            // Update header
            document.getElementById('headerAvatar').textContent = name.charAt(0).toUpperCase();
            document.getElementById('headerName').textContent = name;
            document.getElementById('headerRole').textContent = role || 'مستخدم';
            
            // Switch to chat
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
        });

        // Auto-resize textarea
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Send on Enter (Shift+Enter for new line)
        document.getElementById('messageInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function addMessage(sender, text) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = sender === 'user' ? userData.name.charAt(0).toUpperCase() : '🤖';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTyping() {
            const messagesDiv = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'message assistant';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="typing active">
                    <span></span><span></span><span></span>
                </div>
            `;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            // Add user message
            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';
            
            // Show typing
            showTyping();
            
            try {
                const response = await fetch('/api/autocoder/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        conversation_history: conversationHistory,
                        user_context: userData
                    })
                });
                
                hideTyping();
                
                if (!response.ok) {
                    addMessage('assistant', '❌ عذراً، حدث خطأ في الاتصال');
                    return;
                }
                
                const data = await response.json();
                addMessage('assistant', data.response);
                conversationHistory = data.conversation_history || [];
                
            } catch (error) {
                hideTyping();
                addMessage('assistant', '❌ فشل الاتصال بالخادم');
                console.error(error);
            }
        }
    </script>
</body>
</html>
