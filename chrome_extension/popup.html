<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Zenrex Assistant</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 18px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Tajawal, sans-serif;
      background: linear-gradient(180deg, #0a0a0f 0%, #1a1530 100%);
      color: #fff;
    }
    .logo {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: #FFD700;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }
    .status {
      text-align: center;
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 14px;
    }
    .status.connected { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.4); }
    .status.disconnected { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.4); }
    .status.idle { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.4); }
    label { display: block; font-size: 11px; color: #9ca3af; margin-bottom: 6px; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      background: #0a0a0f;
      border: 1px solid #3f3f4a;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      text-align: center;
      letter-spacing: 4px;
      font-family: monospace;
      direction: ltr;
    }
    input:focus { outline: none; border-color: #FFD700; }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: linear-gradient(90deg, #FFD700, #FFA500);
      color: #000;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: filter 0.2s;
    }
    button:hover { filter: brightness(1.1); }
    button.secondary {
      background: transparent;
      color: #9ca3af;
      border: 1px solid #3f3f4a;
    }
    .help {
      font-size: 11px;
      color: #6b7280;
      text-align: center;
      margin-top: 14px;
      line-height: 1.6;
    }
    .help a { color: #FFD700; text-decoration: none; }
  </style>
</head>
<body>
  <div class="logo">Zenrex Assistant</div>
  <div id="status" class="status idle">جاري التحقق...</div>

  <div id="pair-form">
    <label>الصق رمز الربط (من شات Zenrex):</label>
    <input id="code-input" type="text" maxlength="6" placeholder="ABCDEF" data-testid="pair-code-input">
    <button id="pair-btn" data-testid="pair-button">ربط الإضافة</button>
  </div>

  <div id="connected-actions" style="display:none">
    <button id="unpair-btn" class="secondary" data-testid="unpair-button">إلغاء الربط</button>
  </div>

  <div class="help">
    تجلس وتشاهد الذكاء يتنقّل ويعمل المهام على متصفحك.<br>
    <a href="https://zenrex.ai" target="_blank">zenrex.ai</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
