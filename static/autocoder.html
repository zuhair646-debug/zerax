<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AutoCoder - Zitex AI</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.container{background:white;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-width:900px;width:100%;overflow:hidden}.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:30px;text-align:center}.header h1{font-size:2.5em;margin-bottom:10px}.header p{opacity:0.9;font-size:1.1em}.auth-container{padding:60px 40px;text-align:center}.auth-container h2{color:#333;margin-bottom:30px;font-size:2em}.auth-form{max-width:400px;margin:0 auto}.input-group{margin-bottom:20px;text-align:right}.input-group label{display:block;margin-bottom:8px;color:#555;font-weight:600}.input-group input,.input-group textarea{width:100%;padding:12px 15px;border:2px solid #e0e0e0;border-radius:10px;font-size:1em;transition:all 0.3s;text-align:right}.input-group input:focus,.input-group textarea:focus{outline:none;border-color:#667eea}.input-group textarea{resize:vertical;min-height:100px;font-family:inherit}.btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;padding:15px 40px;border-radius:10px;font-size:1.1em;cursor:pointer;transition:transform 0.2s;width:100%;font-weight:600}.btn:hover{transform:translateY(-2px)}.btn:active{transform:translateY(0)}.chat-container{display:none;height:600px;display:flex;flex-direction:column}.chat-header{background:#f5f5f5;padding:20px;border-bottom:2px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center}.user-info{display:flex;align-items:center;gap:15px}.user-avatar{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;align-items:center;justify-content:center;color:white;font-size:1.5em;font-weight:bold}.user-details h3{color:#333;margin-bottom:5px}.user-details p{color:#666;font-size:0.9em}.logout-btn{background:#ff4757;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600}.logout-btn:hover{background:#ff3838}.messages{flex:1;overflow-y:auto;padding:30px;background:#fafafa}.message{margin-bottom:20px;animation:fadeIn 0.3s}.message.user{text-align:left}.message.assistant{text-align:right}.message-bubble{display:inline-block;padding:15px 20px;border-radius:15px;max-width:70%;word-wrap:break-word}.user .message-bubble{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border-bottom-left-radius:5px}.assistant .message-bubble{background:white;color:#333;border:2px solid #e0e0e0;border-bottom-right-radius:5px}.message-time{font-size:0.8em;opacity:0.7;margin-top:5px}.chat-input-container{background:white;padding:20px;border-top:2px solid #e0e0e0}.chat-input-form{display:flex;gap:10px}.chat-input{flex:1;padding:12px 15px;border:2px solid #e0e0e0;border-radius:10px;font-size:1em;text-align:right}.chat-input:focus{outline:none;border-color:#667eea}.send-btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;padding:12px 30px;border-radius:10px;cursor:pointer;font-weight:600}.send-btn:hover{opacity:0.9}.send-btn:disabled{opacity:0.5;cursor:not-allowed}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.hidden{display:none!important}.show{display:flex!important}</style></head><body><div class="container"><div class="header"><h1>🤖 AutoCoder</h1><p>مساعد البرمجة الذكي من Zitex</p></div><div class="auth-container" id="authContainer"><h2>🔐 تسجيل الدخول</h2><form class="auth-form" id="authForm"><div class="input-group"><label>الاسم:</label><input type="text" id="userName" required placeholder="أدخل اسمك"></div><div class="input-group"><label>الدور:</label><input type="text" id="userRole" required placeholder="مثال: مطور، مدير مشروع"></div><div class="input-group"><label>نبذة عنك (اختياري):</label><textarea id="userBio" placeholder="أخبرني عن نفسك وماذا تريد أن أساعدك به..."></textarea></div><button type="submit" class="btn">دخول</button></form></div><div class="chat-container hidden" id="chatContainer"><div class="chat-header"><div class="user-info"><div class="user-avatar" id="userAvatar"></div><div class="user-details"><h3 id="displayName"></h3><p id="displayRole"></p></div></div><button class="logout-btn" onclick="logout()">تسجيل خروج</button></div><div class="messages" id="messages"></div><div class="chat-input-container"><form class="chat-input-form" id="chatForm"><input type="text" class="chat-input" id="messageInput" placeholder="اكتب رسالتك هنا..." required><button type="submit" class="send-btn" id="sendBtn">إرسال</button></form></div></div></div></div><script>let userData=null;const authForm=document.getElementById('authForm');const chatForm=document.getElementById('chatForm');const authContainer=document.getElementById('authContainer');const chatContainer=document.getElementById('chatContainer');const messagesDiv=document.getElementById('messages');const messageInput=document.getElementById('messageInput');const sendBtn=document.getElementById('sendBtn');authForm.addEventListener('submit',function(e){e.preventDefault();const name=document.getElementById('userName').value;const role=document.getElementById('userRole').value;const bio=document.getElementById('userBio').value;userData={name:name,role:role,bio:bio,joinedAt:new Date().toISOString()};document.getElementById('userAvatar').textContent=name.charAt(0).toUpperCase();document.getElementById('displayName').textContent=name;document.getElementById('displayRole').textContent=role;authContainer.classList.add('hidden');chatContainer.classList.remove('hidden');chatContainer.style.display='flex';addMessage(`مرحباً ${name}! أنا AutoCoder، مساعدك الذكي. كيف أقدر أساعدك اليوم؟`,'assistant');if(bio){addMessage(`شكراً على المعلومات! فهمت أنك ${role}. ${bio?'سأساعدك بناءً على احتياجاتك.':''}`,'assistant')}});chatForm.addEventListener('submit',async function(e){e.preventDefault();const message=messageInput.value.trim();if(!message)return;addMessage(message,'user');messageInput.value='';sendBtn.disabled=true;sendBtn.textContent='جاري الإرسال...';try{const response=await fetch('/api/autocoder/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:message,user_context:userData})});const data=await response.json();if(data.reply){addMessage(data.reply,'assistant')}else{addMessage('عذراً، حدث خطأ. حاول مرة أخرى.','assistant')}}catch(error){addMessage('خطأ في الاتصال بالخادم.','assistant')}finally{sendBtn.disabled=false;sendBtn.textContent='إرسال'}});function addMessage(text,sender){const messageDiv=document.createElement('div');messageDiv.className=`message ${sender}`;const bubble=document.createElement('div');bubble.className='message-bubble';bubble.textContent=text;const time=document.createElement('div');time.className='message-time';time.textContent=new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});messageDiv.appendChild(bubble);messageDiv.appendChild(time);messagesDiv.appendChild(messageDiv);messagesDiv.scrollTop=messagesDiv.scrollHeight}function logout(){userData=null;authContainer.classList.remove('hidden');chatContainer.classList.add('hidden');messagesDiv.innerHTML='';document.getElementById('authForm').reset()}</script></body></html>
