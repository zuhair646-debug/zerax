server {
    listen 80 default_server;
    client_max_body_size 100M;
    root /opt/zerax/frontend/public;
    index index.html;

    # === Compression for HTML/CSS/JS (4-5x smaller payloads) ===
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml font/ttf font/otf application/font-woff;
    gzip_min_length 1024;

    # === Static caching for CSS/JS/images ===
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control 'public, immutable';
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
    location /mockups/ { try_files $uri $uri/ =404; }
    location / { try_files $uri $uri/ /mockups/admin.html; }
}
