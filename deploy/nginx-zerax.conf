server {
    listen 80 default_server;
    client_max_body_size 100M;
    root /opt/zerax/frontend/build;
    index index.html;

    # === Compression for HTML/CSS/JS (4-5x smaller payloads) ===
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml font/ttf font/otf application/font-woff;
    gzip_min_length 1024;

    # === Backend API (FastAPI in Docker on host:8001) ===
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
    }

    # === User uploads (AI-generated images / banners / videos) ===
    location ^~ /static/uploads/ {
        alias /opt/zerax/data/uploads/;
        expires 30d;
        add_header Cache-Control 'public';
    }

    # === Hashed CRA bundles (cache forever — filename includes content hash) ===
    location ^~ /static/ {
        expires 1y;
        add_header Cache-Control 'public, immutable';
        try_files $uri =404;
    }

    # === Mockups (admin / customer storefront / driver / errand) ===
    # Cache JS files inside mockups for 7 days
    location ~* ^/mockups/.+\.(js|css|png|jpg|jpeg|gif|svg|woff2?|ttf)$ {
        expires 7d;
        add_header Cache-Control 'public, immutable';
    }
    location /mockups/ { try_files $uri $uri/ =404; }

    # === Static assets cache for everything else ===
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control 'public, immutable';
    }

    # === React SPA fallback (everything else → index.html) ===
    location / {
        try_files $uri $uri/ /index.html;
    }
}
