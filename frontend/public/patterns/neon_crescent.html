<!DOCTYPE html>
<html dir="rtl" lang="ar"><head><meta charset="UTF-8"><title>Neon Crescent</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
body{background:radial-gradient(circle at 50% 0%,#1e0a2e 0%,#0a0a0b 60%);color:#fff;height:100vh;overflow:hidden;position:relative}
body::before{content:"";position:absolute;top:-100px;left:-50px;right:-50px;height:200px;border-radius:50%;background:radial-gradient(ellipse,rgba(236,72,153,.4),transparent 70%);filter:blur(30px)}
.nav{display:flex;justify-content:center;gap:14px;padding:20px;position:relative;z-index:2}
.nav a{padding:8px 16px;border-radius:99px;border:1px solid rgba(236,72,153,.3);font-size:11px;color:#f0abfc;background:rgba(236,72,153,.05)}
.nav a.active{background:linear-gradient(90deg,#ec4899,#a855f7);color:#fff;border-color:transparent}
.hero{text-align:center;margin-top:24px;position:relative;z-index:2;padding:0 20px}
.hero h1{font-size:42px;font-weight:900;background:linear-gradient(90deg,#fbbf24,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.hero p{margin-top:8px;color:#9ca3af;font-size:13px}
.plates{display:flex;justify-content:center;gap:18px;margin-top:34px;position:relative;z-index:2}
.plate{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#ec4899);box-shadow:0 25px 50px rgba(236,72,153,.45),inset 0 -15px 30px rgba(0,0,0,.3);position:relative;animation:fl 3s ease-in-out infinite}
.plate:nth-child(2){background:linear-gradient(135deg,#10b981,#06b6d4);transform:translateY(-15px) scale(1.12);animation-delay:.3s}
.plate:nth-child(3){background:linear-gradient(135deg,#f97316,#dc2626);animation-delay:.6s}
.plate::after{content:"$45";position:absolute;bottom:-26px;left:0;right:0;text-align:center;color:#fff;font-weight:900;font-size:12px}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.plate:nth-child(2){animation-name:fl2}
@keyframes fl2{0%,100%{transform:translateY(-15px) scale(1.12)}50%{transform:translateY(-30px) scale(1.12)}}
.cta{position:absolute;bottom:30px;left:0;right:0;text-align:center;z-index:2}
.cta button{background:linear-gradient(90deg,#fbbf24,#f59e0b);padding:14px 50px;border:none;border-radius:99px;color:#000;font-weight:900;font-size:14px;cursor:pointer;box-shadow:0 10px 30px rgba(245,158,11,.4)}
</style></head><body>
<nav class="nav"><a class="active">القائمة</a><a>الحجوزات</a><a>التوصيل</a><a>المعرض</a></nav>
<div class="hero"><h1>اكتشف الذوق</h1><p>طازج · يومي · مميز</p></div>
<div class="plates"><div class="plate"></div><div class="plate"></div><div class="plate"></div></div>
<div class="cta"><button>اطلب الآن →</button></div>
</body></html>
