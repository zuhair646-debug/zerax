<!DOCTYPE html>
<html dir="ltr" lang="en"><head><meta charset="UTF-8"><title>Brush Italian</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
body{height:100vh;overflow:hidden;background:linear-gradient(135deg,#f59e0b 0%,#f59e0b 35%,#a8a29e 35%,#a8a29e 100%);padding:20px;position:relative}
.frame{height:100%;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.4);position:relative}
.bar{background:#0f0f0f;color:#fff;padding:14px 26px;display:flex;justify-content:space-between;align-items:center}
.nav{display:flex;gap:18px;font-family:'Permanent Marker',cursive;font-size:13px;color:#fff;letter-spacing:.5px}
.nav .on{color:#34d399}
.logo{display:flex;align-items:center;gap:8px}
.logo .icon{width:34px;height:34px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#0f0f0f;font-size:18px}
.logo b{font-family:'Permanent Marker',cursive;font-size:14px}
.logo b small{display:block;font-size:9px;opacity:.7;font-family:'Tajawal',sans-serif}
.order{padding:6px 18px;background:#34d399;color:#0f0f0f;border-radius:99px;font-weight:900;font-size:11px}
.hero{height:64%;background:url('https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=1200&q=80') center/cover;position:relative;display:flex;align-items:center;padding:0 30px}
.hero::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.7) 0%,rgba(0,0,0,.2) 60%)}
.h1{position:relative;z-index:2;color:#fff}
.h1 .title{font-family:'Permanent Marker',cursive;font-size:54px;letter-spacing:-1px;line-height:.9;text-shadow:0 6px 20px rgba(0,0,0,.7)}
.h1 .underline{width:120px;height:8px;background:#34d399;border-radius:99px;margin-top:8px;transform:skew(-12deg)}
.h1 .res{margin-top:18px;display:inline-block;padding:10px 28px;border:2px solid #fff;color:#fff;border-radius:99px;font-weight:900;font-size:11px;letter-spacing:3px}
.dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:2}
.dots span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.5)}
.dots span.on{background:#34d399;width:18px;border-radius:99px}
.about{padding:14px 24px;display:flex;gap:14px;align-items:center}
.about .left{flex:1.2}
.about .left .lbl{font-family:'Permanent Marker',cursive;color:#34d399;font-size:18px;margin-bottom:6px}
.about .left p{font-size:10px;color:#666;line-height:1.5;max-width:280px}
.about .left .rm{margin-top:8px;font-size:10px;color:#0f0f0f;font-weight:900}
.about .right{display:flex;gap:8px}
.about .right img{width:80px;height:80px;border-radius:12px;object-fit:cover}
</style></head><body>
<div class="frame">
  <div class="bar">
    <div class="nav"><span class="on">Home</span><span>About</span><span>Menu</span></div>
    <div class="logo"><div class="icon">🍕</div><b>FINZIONE<small>Pizzeria Napoletana</small></b></div>
    <div style="display:flex;gap:14px;align-items:center"><div class="nav"><span>Gallery</span><span>Contact</span></div><span class="order">Order</span></div>
  </div>
  <div class="hero">
    <div class="h1"><div class="title">ITALIAN<br>CUISINE</div><div class="underline"></div><span class="res">RESERVE NOW</span></div>
    <div class="dots"><span></span><span></span><span class="on"></span></div>
  </div>
  <div class="about">
    <div class="left"><div class="lbl">About Us</div><p>Finzione is traditional Italian cuisine, as close as you can get without going to Italy. Hand-stretched dough, San Marzano tomatoes.</p><div class="rm">Read More →</div></div>
    <div class="right"><img src="https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=200&q=80" alt=""><img src="https://images.unsplash.com/photo-1572441713132-c542fc4fe282?w=200&q=80" alt=""></div>
  </div>
</div>
</body></html>
