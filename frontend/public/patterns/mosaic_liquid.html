<!DOCTYPE html>
<html dir="rtl" lang="ar"><head><meta charset="UTF-8"><title>Mosaic Liquid</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
body{background:#000;color:#fff;padding:18px;height:100vh;display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:auto 1fr 1fr;gap:12px;overflow:hidden}
.h{grid-column:span 3;display:flex;justify-content:space-between;align-items:center;padding:6px 14px}
.l{font-size:22px;font-weight:900;color:#fff;letter-spacing:-1px}
.btn{padding:10px 22px;border-radius:14px;background:#fff;color:#000;font-weight:900;font-size:11px}
.tile{border-radius:24px;padding:18px;position:relative;overflow:hidden;transition:transform .3s}
.big{grid-row:span 2;background:linear-gradient(135deg,#dc2626 0%,#7c2d12 50%,#000 100%);display:flex;flex-direction:column;justify-content:end;border-radius:32px 8px 32px 8px}
.big h2{font-size:38px;font-weight:900;color:#fff;line-height:.95}
.big p{margin-top:8px;color:#fca5a5;font-size:11px}
.big .tag{display:inline-flex;margin-top:14px;padding:6px 14px;background:#fff;color:#000;border-radius:99px;font-size:11px;font-weight:900;width:fit-content}
.t2{background:linear-gradient(135deg,#10b981,#065f46);border-radius:8px 32px 8px 32px}
.t3{background:linear-gradient(135deg,#f59e0b,#92400e);border-radius:32px 8px 32px 8px}
.t4{background:linear-gradient(135deg,#a855f7,#581c87);border-radius:8px 32px 8px 32px}
.t5{background:linear-gradient(135deg,#0ea5e9,#0c4a6e);border-radius:32px 8px 32px 8px}
.tile .e{font-size:34px;margin-bottom:8px;display:block}
.tile .n{font-weight:900;color:#fff;font-size:15px}
.tile .d{color:rgba(255,255,255,.75);font-size:11px;margin-top:2px}
</style></head><body>
<div class="h"><div class="l">FORNO.</div><div class="btn">احجز طاولة</div></div>
<div class="tile big"><h2>بيتزا<br>المعلّم</h2><p>عجين 72 ساعة · فرن حطب</p><span class="tag">$32 · جديد</span></div>
<div class="tile t2"><div class="e">🌿</div><div class="n">نباتي</div><div class="d">12 صنف</div></div>
<div class="tile t3"><div class="e">🔥</div><div class="n">حار</div><div class="d">جربه إن قدرت</div></div>
<div class="tile t4"><div class="e">🍷</div><div class="n">حجوزات</div><div class="d">VIP rooms</div></div>
<div class="tile t5"><div class="e">🚗</div><div class="n">استلام</div><div class="d">من السيارة</div></div>
</body></html>
