<!DOCTYPE html>
<html dir="ltr" lang="en"><head><meta charset="UTF-8"><title>Verdant Organic</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700;1,900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
body{background:#fff;color:#0d1f1a;height:100vh;overflow:hidden}
.top{background:#0d1f1a;height:56%;display:flex;align-items:center;padding:0 30px;position:relative;overflow:hidden}
.nav{position:absolute;top:18px;left:30px;right:30px;display:flex;justify-content:space-between;align-items:center;color:#86efac;font-size:10px;letter-spacing:2px}
.brand{font-family:'Playfair Display',serif;font-style:italic;font-weight:900;font-size:16px;color:#22c55e}
.links{display:flex;gap:18px}
.copy{flex:1;max-width:55%}
.copy .it{font-family:'Playfair Display',serif;font-style:italic;font-weight:700;font-size:32px;color:#22c55e;line-height:.9}
.copy h1{font-weight:900;font-size:44px;line-height:1;color:#fff;margin-top:4px;letter-spacing:-1px}
.copy p{margin-top:10px;font-size:11px;opacity:.75;color:#a7f3d0;max-width:280px}
.copy .btn{margin-top:14px;display:inline-block;padding:9px 26px;border-radius:99px;background:#22c55e;color:#0d1f1a;font-weight:900;font-size:11px;letter-spacing:1px}
.plate{position:absolute;right:-50px;top:50%;transform:translateY(-50%);width:280px;height:280px;border-radius:50%;border:6px solid #22c55e;overflow:hidden;background:#fff;box-shadow:0 30px 80px rgba(34,197,94,.35)}
.plate img{width:100%;height:100%;object-fit:cover}
.bot{height:44%;background:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:0 30px}
.lbl{font-size:13px;font-weight:900;color:#0d1f1a;margin-bottom:14px}
.row{display:flex;gap:18px}
.cat{text-align:center}
.cat .dot{width:54px;height:54px;border-radius:50%;background:#dcfce7;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 6px}
.cat .dot.on{background:#22c55e;color:#fff}
.cat span{font-size:10px;color:#0d1f1a;font-weight:700}
.tabs{margin-top:18px;display:flex;gap:8px}
.tab{padding:7px 18px;border-radius:99px;background:#fff;border:1px solid #d1fae5;font-size:10px;color:#0d1f1a;font-weight:700}
.tab.on{background:#22c55e;color:#fff;border-color:#22c55e}
</style></head><body>
<div class="top">
  <div class="nav"><div class="brand">Verdant</div><div class="links"><span>HOME</span><span>MENU</span><span>GALLERY</span><span>BOOK</span></div></div>
  <div class="copy"><div class="it">Cozy</div><h1>Vegetarian<br>Restaurant</h1><p>Enjoy the freshest vegetarian dining experience</p><span class="btn">LEARN MORE</span></div>
  <div class="plate"><img src="https://images.unsplash.com/photo-1546833999-b9f581a1996d?w=400&q=80" alt=""></div>
</div>
<div class="bot">
  <div class="lbl">Top Items We Have</div>
  <div class="row">
    <div class="cat"><div class="dot on">🥗</div><span>Bowls</span></div>
    <div class="cat"><div class="dot">🍵</div><span>Soups</span></div>
    <div class="cat"><div class="dot">🥑</div><span>Toast</span></div>
    <div class="cat"><div class="dot">🍰</div><span>Desserts</span></div>
  </div>
  <div class="tabs"><span class="tab on">All</span><span class="tab">Lunch</span><span class="tab">Dinner</span><span class="tab">Sweets</span></div>
</div>
</body></html>
